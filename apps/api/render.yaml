services:
  - type: web
    name: makeup-personal-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh scripts/start.sh
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./makeup_coach.db
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_ON_STARTUP
        value: "true"
